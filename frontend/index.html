<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wolt Ratings</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            wolt: { DEFAULT: "#009de0", dark: "#007bb5" },
            surface: { DEFAULT: "#0f0f0f", card: "#161616", border: "#242424", hover: "#1e1e1e" },
          },
          fontFamily: {
            sans: ['"Inter"', '"Segoe UI"', "sans-serif"],
          },
        },
      },
    };
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    body { background: #0f0f0f; }
    .star-btn { transition: color 0.1s, transform 0.1s; }
    .star-btn:hover { transform: scale(1.2); }
    .notes-area { resize: none; field-sizing: content; min-height: 2rem; }
    .notes-area:focus { outline: none; }
    tr { border-bottom: 1px solid #1f1f1f; }
    .status-badge { display: inline-flex; align-items: center; gap: 4px; }
    .row-fade { animation: fadeIn 0.2s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #0f0f0f; }
    ::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
  </style>
</head>
<body class="text-gray-200 font-sans min-h-screen">

  <!-- Header -->
  <header class="sticky top-0 z-10 bg-[#0f0f0f]/95 backdrop-blur border-b border-[#1f1f1f]">
    <div class="max-w-7xl mx-auto px-6 py-4 flex items-center gap-4 flex-wrap">
      <div class="flex items-center gap-3 mr-auto">
        <span class="text-2xl">🍜</span>
        <div>
          <h1 class="text-base font-semibold text-white leading-none">Wolt Ratings</h1>
          <p class="text-xs text-gray-500 mt-0.5" id="last-synced-label">Loading…</p>
        </div>
      </div>

      <!-- Search -->
      <div class="relative">
        <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-4.35-4.35M17 11A6 6 0 1 1 5 11a6 6 0 0 1 12 0z"/>
        </svg>
        <input
          id="search-input"
          type="text"
          placeholder="Search venue or item…"
          class="bg-[#1a1a1a] border border-[#2a2a2a] rounded-lg pl-9 pr-4 py-2 text-sm text-gray-200 placeholder-gray-600 focus:outline-none focus:border-wolt w-64"
        />
      </div>

      <!-- Filters -->
      <div class="flex items-center gap-3 text-sm">
        <label class="flex items-center gap-2 cursor-pointer text-gray-400 hover:text-gray-200">
          <input type="checkbox" id="hide-failed" class="accent-wolt" />
          <span>Hide failed</span>
        </label>
        <label class="flex items-center gap-2 cursor-pointer text-gray-400 hover:text-gray-200">
          <input type="checkbox" id="only-rated" class="accent-wolt" />
          <span>Rated only</span>
        </label>
      </div>

      <!-- Sort -->
      <select id="sort-select" class="bg-[#1a1a1a] border border-[#2a2a2a] rounded-lg px-3 py-2 text-sm text-gray-300 focus:outline-none focus:border-wolt">
        <option value="date_desc">Newest first</option>
        <option value="date_asc">Oldest first</option>
        <option value="rating_desc">Highest rated</option>
        <option value="venue_asc">Venue A–Z</option>
      </select>

      <div id="order-count" class="text-xs text-gray-600 whitespace-nowrap"></div>
    </div>
  </header>

  <!-- Main -->
  <main class="max-w-7xl mx-auto px-6 py-6">

    <!-- Empty / loading state -->
    <div id="empty-state" class="hidden flex-col items-center justify-center py-32 text-center">
      <div class="text-5xl mb-4">🍣</div>
      <p class="text-gray-400 text-lg font-medium">No orders yet</p>
      <p class="text-gray-600 text-sm mt-2">Install the extension, open wolt.com, and click <strong>Sync Now</strong>.</p>
    </div>

    <div id="loading-state" class="flex flex-col items-center justify-center py-32 text-center">
      <div class="animate-spin text-4xl mb-4">⏳</div>
      <p class="text-gray-500 text-sm">Loading orders…</p>
    </div>

    <!-- Table -->
    <div id="table-container" class="hidden">
      <table class="w-full text-sm">
        <thead>
          <tr class="text-xs text-gray-500 uppercase tracking-wider">
            <th class="text-left pb-3 pr-4 font-medium w-24">Status</th>
            <th class="text-left pb-3 pr-4 font-medium w-32">Date</th>
            <th class="text-left pb-3 pr-4 font-medium w-40">Venue</th>
            <th class="text-left pb-3 pr-4 font-medium">Items</th>
            <th class="text-right pb-3 pr-4 font-medium w-20">Total</th>
            <th class="text-left pb-3 pr-4 font-medium w-36">Rating</th>
            <th class="text-left pb-3 font-medium w-64">Notes</th>
          </tr>
        </thead>
        <tbody id="orders-tbody"></tbody>
      </table>
    </div>

  </main>

  <script src="app.js"></script>
</body>
</html>
