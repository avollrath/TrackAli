<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TrackAli</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <header>
    <img src="icons/logo.svg" alt="" />
    <div>
      <h1>TrackAli</h1>
      <p>AliExpress order library</p>
    </div>
  </header>

  <main>
    <div class="status-row">
      <span class="status-dot" id="page-dot"></span>
      <div>
        <strong id="page-label">Checking page...</strong>
        <small id="page-sub"></small>
      </div>
    </div>
    <div class="status-row">
      <span class="status-dot" id="server-dot"></span>
      <div>
        <strong id="server-label">Checking backend...</strong>
        <small id="server-sub"></small>
      </div>
    </div>

    <button id="sync-btn" disabled>Import all orders</button>
    <div id="result" role="status"></div>
  </main>

  <footer>
    <a href="https://www.aliexpress.com/p/order/index.html" target="_blank">AliExpress orders</a>
    <a href="http://localhost:5000" target="_blank">Dashboard</a>
  </footer>
  <script src="popup.js"></script>
</body>
</html>
